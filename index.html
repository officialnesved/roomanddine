<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#637eff" />
    <link rel="canonical" href="https://roomanddine.com/" />

    <title>RoomAndDine — Run Rooms & Restaurant, in One Place</title>
    <meta
      name="description"
      content="RoomAndDine is a single platform for hotels, banquet halls, and restaurants — bookings, billing, tables, inventory, and staff, all in one place."
    />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RoomAndDine" />
    <meta property="og:url" content="https://roomanddine.com/" />
    <meta property="og:title" content="RoomAndDine — Run Rooms & Restaurant, in One Place" />
    <meta
      property="og:description"
      content="Bookings, quotations, GST invoicing, dine-in POS, inventory, and staff — one platform for hotels, banquet halls, and restaurants."
    />
    <meta property="og:image" content="https://roomanddine.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RoomAndDine — Run Rooms & Restaurant, in One Place" />
    <meta
      name="twitter:description"
      content="Bookings, quotations, GST invoicing, dine-in POS, inventory, and staff — one platform for hotels, banquet halls, and restaurants."
    />
    <meta name="twitter:image" content="https://roomanddine.com/og-image.png" />

    <!-- Structured data: helps Google show a rich result (pricing, org info) rather than a plain link -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "RoomAndDine",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "description": "A single platform for hotels, banquet halls, and restaurants — bookings, billing, tables, inventory, and staff.",
        "offers": [
          { "@type": "Offer", "name": "Restaurant Only", "price": "10000", "priceCurrency": "INR" },
          { "@type": "Offer", "name": "Rooms & Operations", "price": "12000", "priceCurrency": "INR" },
          { "@type": "Offer", "name": "All Inclusive", "price": "15000", "priceCurrency": "INR" }
        ]
      }
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
